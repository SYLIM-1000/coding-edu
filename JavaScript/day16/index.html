<!doctype html>
<html lang="kr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <h1 id="title" class="blue bold">자기소개</h1>
        <h2 class="secondTitle bold">이름과 취미 입력으로 알아보는 JS</h2>
        <p class="normalText" id="container">이름과 취미를 입력하고 버튼을 누르면 아래 내용이 바뀝니다.</p>
        
        <section>
            <table>
                <tr>
                    <th>이름: </th>
                    <td><input type="text" id="name" value="임승용"></td>
                </tr>
                <tr>
                    <th>취미: </th>
                    <td>
                        <ul>
                            <li><input type="text" class="hobby" id="hobby1" value="코딩"></li>
                            <li><input type="text" class="hobby" id="hobby2" value="러닝"></li>
                            <li><input type="text" class="hobby" id="hobby3" value="커피"></li>
                        </ul>
                    </td>
                </tr>
            </table>
        </section>

        <section>
            <button id="changeBtn" class="btn">프로필 변경</button>
        </section>
        
        <section id="changedValue">
            <p>이름: <span id="displayName" class="changeValue">임승용</span></p>
            <p>취미1 : <span id="displayHobby1" class="changeValue">코딩</span></p>
            <p>취미2 : <span id="displayHobby2" class="changeValue">러닝</span></p>
            <p>취미3 : <span id="displayHobby3" class="changeValue">커피</span></p>
        </section>

        <section>
            <h2>할 일 입력하기</h2>
            <p><input type="text" id="todoItem" placeholder="할 일을 입력하세요."></p>
            <button id="todoBtn" class="addBtn">할 일 추가</button>
        </section>

        <section>
            <table>
                <tr>
                    <th>할 일</th>
                    <td>
                        <ul id="todoList">
                        </ul>
                    </td>
                </tr>
            </table>
        </section>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <script src="script.js"></script>
        </body>

</html>
