<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charest="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>회원가입</title>
        <style>
            /* 에러메시지 스타일 */
            .error-message {
                color: red;
                font-size: 14px;
                display: none;
                margin-top: 5px;
            }
        </style>
    </head>
    <body>
        <h1>회원가입</h1>
        <form action="./submit-from.txt" method="post">
            
            <!-- 이름 -->
            <div>
                <label for="name">이름: </label>
                <input type="text" id="name" placeholder="김아무개">
            </div>
            <Br>
                
            <!-- 이메일 -->
            <div>
                <label for="email">이메일: </label>
                <input type="email" id="email" placeholder="abc123@gmail.com">
            </div>
            <Br>

            <!-- 아이디 입력 -->
            <div>
                <label for="userId">아이디:</label>
                <input type="text" id="userId" name="userId" placeholder="아이디">
            </div>
            <Br>

            <!-- 전화번호 -->
            <div>
                <label for="phone">전화번호:</label>    
                <input type="text" id="phone1" name="phone" value="010" style="width: 4ch; text-align: center;"> -
                <input type="text" id="phone2" name="phone" pattern="[0-9]*" style="width: 4ch; text-align: center;"> -
                <input type="text" id="phone3" name="phone" pattern="[0-9]*" style="width: 4ch; text-align: center;">
            </div>
            <br>

            <!-- 비밀번호 입력 -->
            <div>
                <label for="userPw">비밀번호:</label>
                <input type="password" id="userPw" name="userPw" minlength="8" maxlength="20" placeholder="비밀번호"
                required oninput="checkPassword()">
            </div>

            <!-- 비밀번호 확인 입력 -->
            <div>
                <label for="userPw">비밀번호 확인:</label>
                <input type="password" id="userPw2" name="userPw2" minlength="8" maxlength="20" placeholder="비밀번호 재입력"
                required oninput="checkPassword()">
            </div>
            <div id="passwordError" class="error-message">.</div>
            <br>

            <!-- 생년월일 : 년도 -->
            <dev>
                <label for="yearset">생년월일:</label>
                <select id="yearset" name="생년월일">
                    <option value="">년도</option>
                </select>
                <!-- 년도 불러오는 코드 -->
                <script>
                    const yearset = document.getElementById('yearset'); // select 태그 요소 가져오기
                    for (let i = 2026; i >= 1900; i--) {
                        const option = document.createElement('option'); // 옵션 엘리먼츠 생성
                        option.value = i; // 서버로 전송될 값
                        option.textContent = i + '년' //화면에 표시될 텍스트
                        yearset.appendChild(option); //select 태그의 하위 요소로 추가
                    }
                </script>
            </dev>
            
            <!-- 생년월일 : 월 -->
            <dev>
                <label for="monthset"></label>
                <select id="monthset" name="생년월일">
                    <option value="">월</option>
                </select>
                <!-- 년도 불러오는 코드 -->
                <script>
                    const monthset = document.getElementById('monthset'); // select 태그 요소 가져오기
                    for (let i = 1; i <= 12; i++) {
                        const option = document.createElement('option'); // 옵션 엘리먼츠 생성
                        option.value = i; // 서버로 전송될 값
                        option.textContent = i + '월' //화면에 표시될 텍스트
                        monthset.appendChild(option); //select 태그의 하위 요소로 추가
                    }
                </script>
            </dev>

            <!-- 생년월일 : 일 -->
            <dev>
                <label for="dayset"></label>
                <select id="dayset" name="생년월일">
                    <option value="">일</option>
                </select>
                <!-- 년도 불러오는 코드 -->
                <script>
                    const dayset = document.getElementById('dayset'); // select 태그 요소 가져오기
                    for (let i = 1; i <= 31; i++) {
                        const option = document.createElement('option'); // 옵션 엘리먼츠 생성
                        option.value = i; // 서버로 전송될 값
                        option.textContent = i + '일' //화면에 표시될 텍스트
                        dayset.appendChild(option); //select 태그의 하위 요소로 추가
                    }
                </script>
            </dev>
            <br><Br>

            <!-- 생년월일2 -->
            <div>
                <label for="birthDate">생년월일:</label>
                <input type="date" id="birthDate" name="birthDate">
            </div>
            <Br>

            <!-- 성별 -->
            <div>
                <label>성별:</label>
                <input type="radio" id="gender_m" name="gender" value="male">
                <label for="gender_m">남성</label>
                <input type="radio" id="gender_f" name="gender" value="female">
                <label for="gender_f">여성</label>
            </div>
            <br>

            <!-- 거주지역 -->
            <dev>
                <label for="address">거주지역: </label>
                <select id="address" name="address">
                    <option value="seoul">서울</option>
                    <option value="daegu">대구</option>
                    <option value="daegu">부산</option>
                    <option value="inchon">인천</option>
                    <option value="kwangju">광주</option>
                    <option value="daejon">대전</option>
                    <option value="ulsan">울산</option>
                    <option value="sejong">세종</option>
                    <option value="kyungki">경기</option>
                    <option value="kangwon">강원</option>
                    <option value="chungbook">충북</option>
                    <option value="choungnam">충남</option>
                    <option value="jeonbook">전북</option>
                    <option value="jeonnam">전남</option>
                    <option value="kyungsang">경상</option>
                    <option value="kyungbook">경북</option>
                    <option value="jeju">제주</option>
                </select>
            </dev>
            <br><br>

            <!-- 관심분야2 -->
            <label for="hobby">관심 분야:</label>
            <input type="checkbox" id="hobby1" name="hobby" value="marekting">
            <label for="hobby1">마케팅</label>
            <input type="checkbox" id="hobby2" name="hobby" value="science">
            <label for="hobby2">과학</label>
            <input type="checkbox" id="hobby3" name="hobby" value="sports">
            <label for="hobby3">스포츠</label>
            <Br><Br>
            
            <!-- 자기소개 -->
            <dev>
                <label for="intro">자기소개</label><br>
                <textarea id="intro" name="intro" row="4" cols="30" placeholder="내용을 입력하세요"></textarea>
            </dev>
            <br><br>

            <!-- 가입하기 버튼 -->
            <dev>
                <button type="submit">가입하기</button>
            </dev>

            <!-- 리셋 버튼 -->
            <dev>
                <button type="reset">초기화</button>
            </dev>
        </form>
        <script>
            function checkPassword() {
                // 문서에서 비밀번호 관련 각 항목들을 가져와서 벨류 값을 정의
                const userPw = document.getElementById('userPw').value;
                const userPw2 = document.getElementById('userPw2').value;
                const errorDiv = document.getElementById('passwordError');
                
                // 패스워드 길이, 동일 여부 체크
                    // 패스워드가 8자 미만인 경우 
                    if (userPw !== "" && userPw.length < 8) {
                        errorDiv.textContent = "8자 이상 입력해 주세요.";
                        errorDiv.style.display = 'block';
                    }
                    //패스워드가 20자 초과인 경우
                    else if (userPw.length > 20) {
                        errorDiv.textContent = "20자 이하로 입력해 주세요.";
                        errorDiv.style.display = 'block';
                    }
                    //패스워드와 확인이 다를 경우
                    else if (userPw !== "" && userPw2 !== "" && userPw !== userPw2) {
                        errorDiv.textContent = "패스워드가 다릅니다.";
                        errorDiv.style.display = 'block'; // 빨간 글씨 표시
                    } 
                    // 문제가 없을 경우
                    else {
                        errorDiv.style.display = 'none'; // 글씨 숨김
                    }
            }
        </script>
    </body>
</html>
